name: release
on:
  push:
    tags: ["v*.*.*"]

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs: { enabled: ${{ steps.c.outputs.enabled }} }
    steps:
      - id: c
        run: |
          if [ "${{ vars.ENABLE_CI }}" = "1" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

  images:
    needs: gate
    if: needs.gate.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          TAG="${GITHUB_REF_NAME#v}"
          for svc in api worker trainer; do
            DF=infra/docker/Dockerfile
            [ "$svc" != "api" ] && DF="infra/docker/Dockerfile.$svc"
            IMG="ghcr.io/${{ github.repository_owner }}/adherence-ml"
            [ "$svc" != "api" ] && IMG="ghcr.io/${{ github.repository_owner }}/adherence-ml-$svc"
            docker buildx build --push -f "$DF" -t "$IMG:$TAG" -t "$IMG:latest" .
          done
