name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CI is gated behind a repo variable to keep the billing block in place by default.
# Set repository variable ENABLE_CI=1 to enable.
jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        run: |
          if [ "${{ vars.ENABLE_CI }}" = "1" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CI is gated. Set repo variable ENABLE_CI=1 to enable."
          fi

  test:
    needs: gate
    if: needs.gate.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with: { version: "0.4.27" }
      - run: uv python install 3.11
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run mypy packages services || true
      - run: uv run pytest -q

  docker:
    needs: [gate, test]
    if: needs.gate.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -f infra/docker/Dockerfile -t adherence-ml:ci .
