replicaCount:
  api: 2
  worker: 1
  trainer: 1

image:
  repository: ghcr.io/sanjays2402/adherence-ml
  tag: "0.1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 7421

ingress:
  enabled: false
  className: nginx
  hosts:
    - host: adherence-ml.local
      paths: ["/"]

env:
  ADHERENCE_LOG_LEVEL: INFO
  ADHERENCE_LOG_FORMAT: json
  ADHERENCE_DRIFT_PSI_THRESHOLD: "0.2"
  ADHERENCE_SENTRY_ENVIRONMENT: "prod"
  ADHERENCE_SENTRY_TRACES_SAMPLE_RATE: "0.1"
  ADHERENCE_SENTRY_PROFILES_SAMPLE_RATE: "0.0"

secrets:
  jwtSecret: "change-me-in-prod-please-32bytes-min"
  apiKeys: "admin:changeme-admin,service:changeme-svc,viewer:changeme-view"
  dbUrl: "postgresql+psycopg://adherence:adherence@adherence-postgres:5432/adherence"
  redisUrl: "redis://adherence-redis:6379/0"
  mlflowTrackingUri: "http://adherence-mlflow:5000"
  # Leave empty to disable Sentry. Set to a DSN to ship errors and traces.
  sentryDsn: ""

resources:
  api:
    requests: { cpu: "200m", memory: "512Mi" }
    limits:   { cpu: "1500m", memory: "2Gi" }
  worker:
    requests: { cpu: "200m", memory: "512Mi" }
    limits:   { cpu: "1500m", memory: "2Gi" }
  trainer:
    requests: { cpu: "500m", memory: "1Gi" }
    limits:   { cpu: "2",    memory: "4Gi" }

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

serviceAccount:
  create: true
  name: ""

# NetworkPolicy lockdown for api / worker / trainer pods.
# Disabled by default so existing clusters without a CNI that enforces
# NetworkPolicy (or without these dependency labels) keep working. Enable
# in prod after confirming Postgres / Redis / MLflow pod labels match.
networkPolicy:
  enabled: false
  # Namespace labels that should be allowed to scrape Prometheus /metrics on the api.
  prometheusNamespaceLabels:
    name: monitoring
  api:
    # Same-chart pods (worker, trainer) can hit the api on 7421 when true.
    allowSameChart: true
    # Allow Prometheus scrape from prometheusNamespaceLabels above.
    allowPrometheusScrape: true
    # Pod-label selectors of ingress controllers / clients allowed to reach api:7421.
    fromLabels:
      - app.kubernetes.io/name: ingress-nginx
    # Optional namespace-level allowlist for clients in arbitrary pods.
    fromNamespaceLabels: []
  egress:
    # In-cluster Postgres pod labels + port.
    postgres:
      podLabels:
        app.kubernetes.io/name: postgresql
      port: 5432
    # In-cluster Redis pod labels + port.
    redis:
      podLabels:
        app.kubernetes.io/name: redis
      port: 6379
    # In-cluster MLflow pod labels + port.
    mlflow:
      podLabels:
        app.kubernetes.io/name: mlflow
      port: 5000
    # Extra CIDR egress allowlist for SaaS deps (Sentry ingest, OTLP collector, med-tracker).
    # Each entry: { cidr: "1.2.3.0/24", except: ["1.2.3.4/32"] }
    extraCIDRs: []
    # Ports opened for extraCIDRs entries (applies to all of them).
    extraPorts:
      - { protocol: TCP, port: 443 }
