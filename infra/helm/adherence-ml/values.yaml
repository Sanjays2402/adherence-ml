replicaCount:
  api: 2
  worker: 1
  trainer: 1

image:
  repository: ghcr.io/sanjays2402/adherence-ml
  tag: "0.1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 7421

ingress:
  enabled: false
  className: nginx
  hosts:
    - host: adherence-ml.local
      paths: ["/"]

env:
  ADHERENCE_LOG_LEVEL: INFO
  ADHERENCE_LOG_FORMAT: json
  ADHERENCE_DRIFT_PSI_THRESHOLD: "0.2"
  ADHERENCE_SENTRY_ENVIRONMENT: "prod"
  ADHERENCE_SENTRY_TRACES_SAMPLE_RATE: "0.1"
  ADHERENCE_SENTRY_PROFILES_SAMPLE_RATE: "0.0"
  # Request body size cap (1 MiB). Tune via bodySizeLimit.maxBytes in values.
  ADHERENCE_BODY_SIZE_LIMIT_ENABLED: "true"
  ADHERENCE_MAX_BODY_BYTES: "1048576"
  # CORS. In env=prod the settings validator rejects '*' origins/methods/headers,
  # so override these with explicit allowlists per environment via `--set-string`
  # or environment-specific values files. Defaults here keep dev clusters working.
  ADHERENCE_ENV: "prod"
  ADHERENCE_API_CORS_ORIGINS: "https://adherence.example.com"
  ADHERENCE_API_CORS_METHODS: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
  ADHERENCE_API_CORS_HEADERS: "Authorization,Content-Type,X-API-Key,X-Request-ID,Idempotency-Key"
  ADHERENCE_API_CORS_ALLOW_CREDENTIALS: "false"
  ADHERENCE_API_CORS_MAX_AGE_SECONDS: "600"

secrets:
  jwtSecret: "change-me-in-prod-please-32bytes-min"
  apiKeys: "admin:changeme-admin,service:changeme-svc,viewer:changeme-view"
  dbUrl: "postgresql+psycopg://adherence:adherence@adherence-postgres:5432/adherence"
  redisUrl: "redis://adherence-redis:6379/0"
  mlflowTrackingUri: "http://adherence-mlflow:5000"
  # Leave empty to disable Sentry. Set to a DSN to ship errors and traces.
  sentryDsn: ""

resources:
  api:
    requests: { cpu: "200m", memory: "512Mi" }
    limits:   { cpu: "1500m", memory: "2Gi" }
  worker:
    requests: { cpu: "200m", memory: "512Mi" }
    limits:   { cpu: "1500m", memory: "2Gi" }
  trainer:
    requests: { cpu: "500m", memory: "1Gi" }
    limits:   { cpu: "2",    memory: "4Gi" }

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

serviceAccount:
  create: true
  name: ""

# NetworkPolicy lockdown for api / worker / trainer pods.
# Disabled by default so existing clusters without a CNI that enforces
# NetworkPolicy (or without these dependency labels) keep working. Enable
# in prod after confirming Postgres / Redis / MLflow pod labels match.
networkPolicy:
  enabled: false
  # Namespace labels that should be allowed to scrape Prometheus /metrics on the api.
  prometheusNamespaceLabels:
    name: monitoring
  api:
    # Same-chart pods (worker, trainer) can hit the api on 7421 when true.
    allowSameChart: true
    # Allow Prometheus scrape from prometheusNamespaceLabels above.
    allowPrometheusScrape: true
    # Pod-label selectors of ingress controllers / clients allowed to reach api:7421.
    fromLabels:
      - app.kubernetes.io/name: ingress-nginx
    # Optional namespace-level allowlist for clients in arbitrary pods.
    fromNamespaceLabels: []
  egress:
    # In-cluster Postgres pod labels + port.
    postgres:
      podLabels:
        app.kubernetes.io/name: postgresql
      port: 5432
    # In-cluster Redis pod labels + port.
    redis:
      podLabels:
        app.kubernetes.io/name: redis
      port: 6379
    # In-cluster MLflow pod labels + port.
    mlflow:
      podLabels:
        app.kubernetes.io/name: mlflow
      port: 5000
    # Extra CIDR egress allowlist for SaaS deps (Sentry ingest, OTLP collector, med-tracker).
    # Each entry: { cidr: "1.2.3.0/24", except: ["1.2.3.4/32"] }
    extraCIDRs: []
    # Ports opened for extraCIDRs entries (applies to all of them).
    extraPorts:
      - { protocol: TCP, port: 443 }

# Prometheus monitoring integration.
#
# `serviceMonitor` and `prometheusRule` require the Prometheus Operator CRDs
# (monitoring.coreos.com/v1) to be installed in the cluster. Disabled by
# default so vanilla clusters render cleanly. The pod / service annotation
# toggles target classic Prometheus setups that scrape via kubernetes_sd
# annotations instead of the Operator.
#
# The api Service exposes a named "http" port that maps to containerPort
# 7421. The /metrics text exposition is rendered by adherence_common.prom
# and is auth-free by design (lock down with NetworkPolicy in prod).
monitoring:
  serviceMonitor:
    enabled: false
    # Override release namespace if the Operator watches a separate one.
    namespace: ""
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
    honorLabels: false
    # Extra labels (e.g. release: kube-prometheus-stack) the Operator's
    # serviceMonitorSelector matches on.
    additionalLabels: {}
    relabelings: []
    metricRelabelings: []
  prometheusRule:
    enabled: false
    namespace: ""
    interval: 30s
    additionalLabels: {}
    thresholds:
      errorRate: 0.05
      errorRateFor: 10m
      latencyP95Ms: 750
      latencyFor: 10m
      noTrafficFor: 15m
      noModelFor: 10m
      targetDownFor: 5m
  podAnnotations:
    # Adds prometheus.io/scrape annotations on api pods for classic
    # kubernetes_sd scrape configs. Leave disabled if you use the Operator.
    enabled: false
    path: /metrics
  serviceAnnotations:
    enabled: false
    path: /metrics

# Pod and container security hardening, aligned with the Kubernetes Pod
# Security Standards "restricted" profile (PSA v1.25+). Defaults are safe
# for production and match what the Dockerfile already prepares:
#
#   * containers run as non-root uid 1001 (see infra/docker/Dockerfile)
#   * read-only root filesystem (writable scratch comes from emptyDir mounts
#     listed under `writableDirs` below)
#   * all Linux capabilities dropped
#   * privilege escalation disabled
#   * seccomp profile defaults to the container runtime default
#
# Disable per environment by setting `securityContext.enabled=false` only if
# you are running on a cluster that cannot honor these constraints (e.g. an
# older PSP setup that requires privileged sidecars).
securityContext:
  enabled: true
  pod:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
    seccompProfile:
      type: RuntimeDefault
  container:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    capabilities:
      drop:
        - ALL
  # Tmpfs mounts attached to every component so a read-only root filesystem
  # still has scratch space for /tmp and any framework caches. Each entry
  # becomes an emptyDir volume + matching volumeMount on the container.
  writableDirs:
    - name: tmp
      mountPath: /tmp
      sizeLimit: 64Mi
    - name: home-cache
      mountPath: /home/adherence/.cache
      sizeLimit: 64Mi
