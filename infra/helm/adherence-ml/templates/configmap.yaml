apiVersion: v1
kind: Secret
metadata:
  name: {{ include "adherence.fullname" . }}-secrets
  labels: {{- include "adherence.labels" . | nindent 4 }}
type: Opaque
stringData:
  ADHERENCE_JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  ADHERENCE_API_KEYS:   {{ .Values.secrets.apiKeys   | quote }}
  ADHERENCE_DB_URL:     {{ .Values.secrets.dbUrl     | quote }}
  ADHERENCE_REDIS_URL:  {{ .Values.secrets.redisUrl  | quote }}
  ADHERENCE_MLFLOW_TRACKING_URI: {{ .Values.secrets.mlflowTrackingUri | quote }}
{{- if .Values.secrets.sentryDsn }}
  ADHERENCE_SENTRY_DSN: {{ .Values.secrets.sentryDsn | quote }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "adherence.fullname" . }}-env
  labels: {{- include "adherence.labels" . | nindent 4 }}
data:
{{- range $k, $v := .Values.env }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
