{{- if .Values.monitoring.prometheusRule.enabled }}
{{- /*
  PrometheusRule for adherence-ml. Alerts target real metrics emitted by
  adherence_common.prom (api request counter, request duration histogram,
  model loaded gauge). Thresholds are exposed in values.yaml.
*/}}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "adherence.fullname" . }}-api
  {{- with .Values.monitoring.prometheusRule.namespace }}
  namespace: {{ . }}
  {{- end }}
  labels:
    {{- include "adherence.labels" . | nindent 4 }}
    {{- with .Values.monitoring.prometheusRule.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: {{ include "adherence.fullname" . }}-api.rules
      interval: {{ .Values.monitoring.prometheusRule.interval | default "30s" }}
      rules:
        - alert: AdherenceApiHighErrorRate
          expr: |
            (
              sum(rate(adherence_api_requests_total{status=~"5.."}[5m]))
              /
              clamp_min(sum(rate(adherence_api_requests_total[5m])), 1e-9)
            ) > {{ .Values.monitoring.prometheusRule.thresholds.errorRate | default 0.05 }}
          for: {{ .Values.monitoring.prometheusRule.thresholds.errorRateFor | default "10m" }}
          labels:
            severity: page
            service: adherence-ml
          annotations:
            summary: "adherence-ml API 5xx rate above threshold"
            description: "5xx ratio over 5m exceeds {{ .Values.monitoring.prometheusRule.thresholds.errorRate | default 0.05 }} for {{ .Values.monitoring.prometheusRule.thresholds.errorRateFor | default "10m" }}."

        - alert: AdherenceApiHighLatencyP95
          expr: |
            histogram_quantile(
              0.95,
              sum by (le) (rate(adherence_api_request_duration_ms_bucket[5m]))
            ) > {{ .Values.monitoring.prometheusRule.thresholds.latencyP95Ms | default 750 }}
          for: {{ .Values.monitoring.prometheusRule.thresholds.latencyFor | default "10m" }}
          labels:
            severity: page
            service: adherence-ml
          annotations:
            summary: "adherence-ml API p95 latency above threshold"
            description: "p95 request duration over 5m exceeds {{ .Values.monitoring.prometheusRule.thresholds.latencyP95Ms | default 750 }}ms."

        - alert: AdherenceApiNoTraffic
          expr: |
            sum(rate(adherence_api_requests_total[10m])) == 0
          for: {{ .Values.monitoring.prometheusRule.thresholds.noTrafficFor | default "15m" }}
          labels:
            severity: warning
            service: adherence-ml
          annotations:
            summary: "adherence-ml API receiving no traffic"
            description: "No HTTP requests counted over the last 10m. Check ingress, NetworkPolicy, and pod readiness."

        - alert: AdherenceApiNoModelLoaded
          expr: |
            max(adherence_model_loaded) < 1
          for: {{ .Values.monitoring.prometheusRule.thresholds.noModelFor | default "10m" }}
          labels:
            severity: page
            service: adherence-ml
          annotations:
            summary: "adherence-ml has no model loaded"
            description: "adherence_model_loaded gauge is < 1 across all replicas. Predictions will fail or fall back."

        - alert: AdherenceApiTargetDown
          expr: |
            up{job=~".*adherence.*api.*"} == 0
          for: {{ .Values.monitoring.prometheusRule.thresholds.targetDownFor | default "5m" }}
          labels:
            severity: page
            service: adherence-ml
          annotations:
            summary: "adherence-ml API scrape target down"
            description: "Prometheus cannot scrape the adherence-ml API /metrics endpoint."
{{- end }}
