apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "adherence.fullname" . }}-api
  labels: {{- include "adherence.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount.api }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "adherence.name" . }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "adherence.name" . }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ include "adherence.serviceAccountName" . }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 7421
          envFrom:
            - configMapRef: { name: {{ include "adherence.fullname" . }}-env }
            - secretRef:    { name: {{ include "adherence.fullname" . }}-secrets }
          readinessProbe:
            httpGet: { path: /healthz, port: 7421 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /livez, port: 7421 }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources: {{- toYaml .Values.resources.api | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "adherence.fullname" . }}-api
  labels: {{- include "adherence.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 7421
      name: http
  selector:
    app.kubernetes.io/name: {{ include "adherence.name" . }}
    app.kubernetes.io/component: api
