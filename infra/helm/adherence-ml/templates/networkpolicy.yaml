  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "adherence.name" . }}
              app.kubernetes.io/component: api
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- with .Values.networkPolicy.egress.postgres }}
    - to:
        - podSelector:
            matchLabels: {{- toYaml .podLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .port }}
    {{- end }}
    {{- with .Values.networkPolicy.egress.redis }}
    - to:
        - podSelector:
            matchLabels: {{- toYaml .podLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .port }}
    {{- end }}
    {{- with .Values.networkPolicy.egress.mlflow }}
    - to:
        - podSelector:
            matchLabels: {{- toYaml .podLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .port }}
    {{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "adherence.fullname" . }}-trainer
  labels: {{- include "adherence.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "adherence.name" . }}
      app.kubernetes.io/component: trainer
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- with .Values.networkPolicy.egress.postgres }}
    - to:
        - podSelector:
            matchLabels: {{- toYaml .podLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .port }}
    {{- end }}
    {{- with .Values.networkPolicy.egress.mlflow }}
    - to:
        - podSelector:
            matchLabels: {{- toYaml .podLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .port }}
    {{- end }}
    {{- with .Values.networkPolicy.egress.extraCIDRs }}
    - to:
        {{- range . }}
        - ipBlock:
            cidr: {{ .cidr }}
            {{- with .except }}
            except: {{- toYaml . | nindent 14 }}
            {{- end }}
        {{- end }}
      ports:
        {{- range $.Values.networkPolicy.egress.extraPorts }}
        - protocol: {{ .protocol | default "TCP" }}
          port: {{ .port }}
        {{- end }}
    {{- end }}
{{- end }}
